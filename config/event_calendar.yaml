# Event blackout calendar — see STRATEGY_SPEC.md §7
#
# Rules:
#   - No new entries on listed dates.
#   - No new entries after 14:00 ET on the prior trading session.
#   - Existing positions: hold; close only via standard exit rules unless ≥50% profit at 13:00 ET prior session.
#
# Sources:
#   FOMC: https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm
#   CPI:  https://www.bls.gov/schedule/news_release/cpi.htm
#   NFP:  first Friday of each month (verify on BLS)
#
